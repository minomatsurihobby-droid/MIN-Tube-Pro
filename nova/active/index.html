<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaBrowser</title>
    
    <script src="check.js" defer></script>
    <script defer src="scripts/lstimer.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/vanjs-org/van/public/van-1.5.2.nomodule.min.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
    <script src="scripts/tabs.mjs" type="module" defer></script>
    <script defer src="https://cdn.jsdelivr.net/gh/tf7software/Font-Awesome-pro-cdn@main/js/all.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --chrome-bg: #202124;
        --chrome-toolbar: #323639;
        --chrome-omnibox: #202124;
        --chrome-text: #f1f3f4;
        --chrome-text-muted: #9aa0a6;
        --chrome-hover-bg: rgba(255, 255, 255, 0.08);
        --chrome-blue: #8ab4f8;
        --chrome-separator: rgba(255, 255, 255, 0.15);
      }

      * { box-sizing: border-box; }

      body {
        padding: 0; margin: 0;
        height: 100vh; width: 100vw;
        display: flex; flex-direction: column;
        background-color: var(--chrome-bg);
        font-family: 'Roboto', sans-serif;
        overflow: hidden;
        color: var(--chrome-text);
      }

      #loading-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-color: var(--chrome-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
      }

      .loader-content {
        text-align: center;
      }

      .nova-spinner {
        width: 60px;
        height: 60px;
        border: 3px solid transparent;
        border-top-color: var(--chrome-blue);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 24px;
        position: relative;
        display: inline-block;
      }
      .nova-spinner::before {
        content: "";
        position: absolute;
        top: 5px; left: 5px; right: 5px; bottom: 5px;
        border: 3px solid transparent;
        border-top-color: #f1f3f4;
        border-radius: 50%;
        animation: spin 2s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .loading-text {
        font-weight: 300;
        font-size: 20px;
        letter-spacing: 1.5px;
        color: var(--chrome-text);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.6; transform: scale(0.98); }
        50% { opacity: 1; transform: scale(1); }
      }

      #loading-overlay.fade-out {
        opacity: 0;
        visibility: hidden;
      }


      header {
        background-color: var(--chrome-bg);
        display: flex; flex-direction: column;
        width: 100%; z-index: 100;
      }

      .tab-strip {
        display: flex; align-items: flex-end;
        padding: 8px 8px 0 8px;
        height: 40px; gap: 4px;
        overflow-x: auto; scrollbar-width: none;
      }
      .tab-strip::-webkit-scrollbar { display: none; }

      #tab-list { display: flex; align-items: flex-end; flex-shrink: 0; height: 100%; }

      .tab-item {
        display: flex; align-items: center; gap: 8px;
        height: 32px; padding: 0 10px 0 12px;
        background: transparent; color: var(--chrome-text-muted);
        border: none; border-radius: 8px 8px 0 0;
        cursor: pointer; min-width: 160px; max-width: 240px;
        font-size: 12px; position: relative;
        transition: background-color 0.15s; outline: none;
      }
      .tab-item:not(.selectedTab):hover { background-color: var(--chrome-hover-bg); }
      .tab-item.selectedTab { background-color: var(--chrome-toolbar); color: var(--chrome-text); z-index: 2; }
      
      .tab-item::after {
        content: ""; position: absolute; right: -2px; top: 25%; height: 50%; width: 1px;
        background-color: var(--chrome-separator);
      }
      .tab-item:hover::after, .tab-item.selectedTab::after, .tab-item.selectedTab + .tab-item::after { opacity: 0; }

      .tab-item img { width: 16px; height: 16px; }
      .tab-item span { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: left; }
      .tab-item .close {
        background: transparent; border: none; color: var(--chrome-text-muted);
        width: 20px; height: 20px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        opacity: 0; transition: 0.2s;
      }
      .tab-item:hover .close, .tab-item.selectedTab .close { opacity: 1; }
      .tab-item .close:hover { background-color: rgba(255, 255, 255, 0.2); color: var(--chrome-text); }

      #new-tab {
        background: transparent; border: none; color: var(--chrome-text);
        font-size: 20px; cursor: pointer; height: 28px; width: 28px;
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        margin-left: 4px; margin-bottom: 2px; flex-shrink: 0;
      }
      #new-tab:hover { background-color: var(--chrome-hover-bg); }
      #new-tab span { display: none; }

      .toolbar {
        background-color: var(--chrome-toolbar);
        display: flex; align-items: center;
        padding: 4px 8px; height: 44px; gap: 8px;
        border-bottom: 1px solid #1c1d1f;
      }

      .nav-btns { display: flex; gap: 2px; }
      .nav-btns button, .menu-btns button {
        background: transparent; border: none; color: var(--chrome-text);
        font-size: 18px; cursor: pointer; width: 32px; height: 32px;
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
      }
      .nav-btns button:hover, .menu-btns button:hover { background-color: var(--chrome-hover-bg); }

      #url-form { flex-grow: 1; display: flex; align-items: center; }
      .omnibox-wrapper {
        display: flex; align-items: center;
        background-color: var(--chrome-omnibox);
        border-radius: 999px; width: 100%; height: 32px;
        padding: 0 12px; border: 1px solid transparent;
      }
      .omnibox-wrapper:focus-within { border-color: var(--chrome-blue); }

      .incognito-icon { color: var(--chrome-text-muted); font-size: 13px; margin-right: 10px; }

      #url-input {
        flex-grow: 1; background: transparent; border: none;
        color: var(--chrome-text); font-size: 13.5px;
        outline: none;
      }

      #tab-view { flex-grow: 1; background-color: #323639; position: relative; width: 100%; height: 100%; }
      .tab-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background-color: #fff; }

      #menu-overlay {
        position: absolute; top: 84px; right: 10px;
        background-color: #28292c; border: 1px solid rgba(255,255,255,0.1);
        border-radius: 8px; padding: 8px 0; display: none;
        flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        z-index: 1000; min-width: 240px;
      }
      #menu-overlay.active { display: flex; animation: menuFadeIn 0.15s ease-out; }
      @keyframes menuFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
      .option { padding: 10px 20px; color: var(--chrome-text); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
      .option:hover { background-color: var(--chrome-hover-bg); }
      .option i { color: var(--chrome-text-muted); font-size: 16px; width: 20px; text-align: center; }
    </style>
  </head>

  <body>
    <div id="loading-overlay">
      <div class="loader-content">
        <div class="nova-spinner"></div>
        <div class="loading-text">NovaBrowser is loading...</div>
      </div>
    </div>

    <div id="nav" style="display:none;"></div>
    <div id="main-content" style="display:none;"></div>

    <header>
      <div class="tab-strip">
        <div id="tab-list"></div>
        <button id="new-tab">
          <ion-icon name="add-outline"></ion-icon>
          <span>New Tab</span>
        </button>
      </div>

      <div class="toolbar">
        <div class="nav-btns">
          <button id="page-back"><ion-icon name="arrow-back-outline"></ion-icon></button>
          <button id="page-forward"><ion-icon name="arrow-forward-outline"></ion-icon></button>
          <button id="page-refresh"><ion-icon name="refresh-outline"></ion-icon></button>
          <button onclick="window.location.href='/'"><ion-icon name="home-outline"></ion-icon></button>
        </div>

        <form id="url-form">
          <div class="omnibox-wrapper">
            <i class="fa-solid fa-user-secret incognito-icon"></i>
            <input type="text" id="url-input" placeholder="Search or type a URL" autocomplete="off" spellcheck="false" />
          </div>
        </form>

        <div class="menu-btns">
          <button id="options-btn"><ion-icon name="ellipsis-vertical"></ion-icon></button>
        </div>
      </div>
    </header>

    <div id="tab-view"></div>

    <div id="menu-overlay">
      <div class="option" id="devtools-option"><i class="fa-solid fa-code"></i> Developer Tools</div>
      <div class="option" id="abc-option"><i class="fa-solid fa-mask"></i> Open in about:blank</div>
      <div class="option" id="git-option"><i class="fa-brands fa-github"></i> GitHub Source</div>
    </div>

    <script>
      const optionsBtn = document.getElementById("options-btn");
      const overlay = document.getElementById("menu-overlay");
      optionsBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        overlay.classList.toggle("active");
      });
      document.addEventListener("click", () => overlay.classList.remove("active"));

      window.addEventListener("load", () => {
        const loader = document.getElementById("loading-overlay");
        

        setTimeout(() => {
          loader.classList.add("fade-out");
          setTimeout(() => {
            loader.remove();
          }, 600);
        }, 800);
      });

      setInterval(() => {
        const urlInput = document.getElementById("url-input");
        const targetUrl = "https://nova-search.edgeone.app/";
        const displayUrl = "nova://home";

        if (urlInput && document.activeElement !== urlInput) {
          if (urlInput.value.includes(targetUrl)) {
            urlInput.value = displayUrl;
          }
        }
      }, 100);
    </script>
  </body>
</html>
