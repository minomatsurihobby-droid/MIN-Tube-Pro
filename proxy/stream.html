<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELIXIR | Stream Neural Link</title>
    <link rel="icon" type="image/x-icon" href="/favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
        }

        /* --- Fullscreen Background Thumbnail --- */
        #bg-thumbnail {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            filter: brightness(0.4) blur(10px);
            transform: scale(1.1); /* ぼかしの縁を隠すため */
            transition: filter 1.5s ease;
        }

        /* Scanline effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- Loading Layer --- */
        #loading-ui {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
        }

        /* Central Orb */
        .orb-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 2rem;
        }

        .outer-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(168, 85, 247, 0.3);
            border-top: 2px solid #a855f7;
            border-radius: 50%;
            animation: spin 2s linear infinite;
        }

        .inner-ring {
            position: absolute;
            top: 15%; left: 15%;
            width: 70%; height: 70%;
            border: 2px solid rgba(99, 102, 241, 0.2);
            border-bottom: 2px solid #6366f1;
            border-radius: 50%;
            animation: spin-reverse 1.5s linear infinite;
        }

        .elixir-core {
            position: absolute;
            top: 30%; left: 30%;
            width: 40%; height: 40%;
            background: radial-gradient(circle, #fff 0%, #a855f7 100%);
            border-radius: 50%;
            box-shadow: 0 0 30px #a855f7;
            animation: pulse 2s ease-in-out infinite;
        }

        /* Status Text */
        .brand {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 0.8rem;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.8);
            margin-bottom: 0.5rem;
        }

        .loading-msg {
            font-family: 'Fira Code', monospace;
            color: #a855f7;
            font-size: 1rem;
            letter-spacing: 0.2rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        /* --- Log Console --- */
        .console-box {
            width: 80%;
            max-width: 800px;
            height: 200px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 4px;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .console-content {
            display: flex;
            flex-direction: column-reverse;
        }

        .log-line {
            margin-bottom: 4px;
            display: flex;
            animation: logFadeIn 0.3s ease-out forwards;
        }

        .log-ts { color: #555; margin-right: 10px; }
        .log-tag { color: #6366f1; margin-right: 10px; font-weight: bold; }
        .log-msg { color: #00ff9d; }
        .log-err { color: #ff4757; }

        /* --- Transitions --- */
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes spin-reverse { to { transform: rotate(-360deg); } }
        @keyframes pulse { 
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 50px #a855f7; }
        }
        @keyframes logFadeIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }

        /* --- Error Screen --- */
        .error-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 0, 0, 0.95);
            z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        #embed-frame {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            border: none;
            display: none;
            z-index: 50;
        }
    </style>
</head>
<body>
    <img id="bg-thumbnail" src="" alt="">
    <div class="scanlines"></div>

    <div id="loading-ui">
        <div class="orb-container">
            <div class="outer-ring"></div>
            <div class="inner-ring"></div>
            <div class="elixir-core"></div>
        </div>
        <h1 class="brand">ELIXIR</h1>
        <p class="loading-msg" id="status-main">Establishing Stream Link...</p>
        
        <div class="console-box">
            <div id="console-content" class="console-content">
                </div>
        </div>
    </div>

    <div id="error-screen" class="error-overlay">
        <h2 style="color: #ff4757; font-size: 2rem; margin-bottom: 1rem;">CRITICAL CONNECTION FAILURE</h2>
        <div id="error-details" style="font-family: 'Fira Code', monospace; color: #ccc; max-width: 600px; text-align: left; background: #000; padding: 20px; border-left: 4px solid #ff4757;"></div>
        <button onclick="location.reload()" style="margin-top: 2rem; background: #ff4757; color: #fff; border: none; padding: 10px 30px; font-family: inherit; cursor: pointer;">REBOOT SYSTEM</button>
    </div>

    <iframe id="embed-frame"></iframe>

    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script type="module">
        import { registerSW } from "/prxy/register-sw.mjs";
        import * as BareMux from "/prxy/baremux/index.mjs";

        const wispServers = [
            "wss://wisp.rhw.one/",
            "wss://anura.pro/",
            "wss://wisp.mercurywork.shop/"
        ];

        const consoleContent = document.getElementById('console-content');
        const statusMain = document.getElementById('status-main');

        // --- Log Engine ---
        function addLog(msg, type = 'info') {
            const line = document.createElement('div');
            line.className = 'log-line';
            const ts = new Date().toISOString().split('T')[1].split('Z')[0];
            line.innerHTML = `
                <span class="log-ts">[${ts}]</span>
                <span class="log-tag">SYS::STREAM</span>
                <span class="${type === 'error' ? 'log-err' : 'log-msg'}">${msg.toUpperCase()}</span>
            `;
            consoleContent.prepend(line);
            if (consoleContent.childNodes.length > 20) consoleContent.lastChild.remove();
        }

        // --- Video ID Parser ---
        function getVideoId(url) {
            const match = url.match(/(?:embed\/|v=)([^#\/\?&]+)/);
            return match ? match[1] : null;
        }

        // --- Proxy Logic ---
        const connection = new BareMux.BareMuxConnection("/prxy/baremux/worker.js");

        async function initStream() {
            const fragment = window.location.hash.substring(1);
            const targetUrl = fragment ? decodeURIComponent(fragment) : null;

            if (!targetUrl) {
                showError("No destination hash detected. Protocol aborted.");
                return;
            }

            // Set Thumbnail
            const vid = getVideoId(targetUrl);
            if (vid) {
                const bg = document.getElementById('bg-thumbnail');
                bg.src = `https://i.ytimg.com/vi/${vid}/maxresdefault.jpg`;
                // Fallback if maxres doesn't exist
                bg.onerror = () => bg.src = `https://i.ytimg.com/vi/${vid}/hqdefault.jpg`;
                addLog(`Target detected: YouTube Video ID [${vid}]`);
            }

            try {
                addLog("Initiating neural handshake with Wisp nodes...");
                
                let activeWisp = null;
                for (const url of wispServers) {
                    addLog(`Attempting connection: ${new URL(url).hostname}...`);
                    const isUp = await new Promise(res => {
                        const ws = new WebSocket(url);
                        const t = setTimeout(() => { ws.close(); res(false); }, 3000);
                        ws.onopen = () => { clearTimeout(t); ws.close(); res(true); };
                        ws.onerror = () => { clearTimeout(t); res(false); };
                    });

                    if (isUp) {
                        activeWisp = url;
                        addLog(`Handshake success: Node ${new URL(url).hostname}`, 'success');
                        break;
                    }
                }

                if (!activeWisp) throw new Error("All uplink nodes are unreachable. Check your firewall.");

                statusMain.textContent = "Injecting Proxy Layer...";
                addLog("Injecting Ultraviolet transport layers...");
                await connection.setTransport("/prxy/epoxy/index.mjs", [{ wisp: activeWisp }]);
                
                addLog("Registering Service Worker persistence...");
                await registerSW();

                addLog("Encoding stream packets for bypass...");
                const proxiedUrl = __uv$config.prefix + __uv$config.encodeUrl(targetUrl);
                
                addLog("All systems nominal. Opening stream...");
                const iframe = document.getElementById('embed-frame');
                
                iframe.onload = () => {
                    addLog("Stream synchronized successfully.", 'success');
                    setTimeout(() => {
                        document.getElementById('loading-ui').style.display = 'none';
                        document.getElementById('bg-thumbnail').style.filter = 'brightness(1) blur(0px)';
                        iframe.style.display = 'block';
                    }, 500);
                };

                iframe.src = proxiedUrl;

            } catch (err) {
                showError(err.message);
            }
        }

        function showError(msg) {
            const screen = document.getElementById('error-screen');
            const details = document.getElementById('error-details');
            screen.style.display = 'flex';
            details.textContent = `CRITICAL_ERR: ${msg}\nTIME: ${new Date().toLocaleString()}\nTRACE: ${Math.random().toString(16).slice(2)}`;
            addLog(`Error: ${msg}`, 'error');
        }

        // Run on load
        window.addEventListener('load', () => {
            if (typeof __uv$config !== 'undefined') initStream();
            else {
                const check = setInterval(() => {
                    if (typeof __uv$config !== 'undefined') {
                        clearInterval(check);
                        initStream();
                    }
                }, 100);
            }
        });
    </script>
</body>
</html>
