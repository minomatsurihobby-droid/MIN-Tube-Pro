<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELIXIR Network</title>
    <link rel="icon" type="image/x-icon" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #03050a;
            font-family: 'JetBrains Mono', monospace;
            color: #ffffff;
        }

        /* ── Particles ── */
        #particles-js {
            position: fixed;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 1;
            opacity: 0.5;
        }

        /* ── Embed iframe ── */
        #embed-frame {
            width: 100vw; height: 100vh;
            border: none; display: none;
            position: relative; z-index: 2;
        }

        /* ══════════════════════════════════════════
           STREAM LOADING SCREEN
        ══════════════════════════════════════════ */
        .stream-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(ellipse at 50% 40%, #0d1b2e 0%, #03050a 70%);
            position: relative;
            z-index: 10;
            overflow: hidden;
        }

        /* Scanline overlay */
        .stream-loading::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,255,180,0.018) 2px,
                rgba(0,255,180,0.018) 4px
            );
            pointer-events: none;
            z-index: 0;
            animation: scanlines 8s linear infinite;
        }

        @keyframes scanlines {
            0% { background-position: 0 0; }
            100% { background-position: 0 400px; }
        }

        /* Corner brackets */
        .corner { position: absolute; width: 40px; height: 40px; z-index: 2; }
        .corner--tl { top: 24px; left: 24px; border-top: 2px solid #00ffb4; border-left: 2px solid #00ffb4; }
        .corner--tr { top: 24px; right: 24px; border-top: 2px solid #00ffb4; border-right: 2px solid #00ffb4; }
        .corner--bl { bottom: 24px; left: 24px; border-bottom: 2px solid #00ffb4; border-left: 2px solid #00ffb4; }
        .corner--br { bottom: 24px; right: 24px; border-bottom: 2px solid #00ffb4; border-right: 2px solid #00ffb4; }

        /* Top status bar */
        .status-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #00ffb4, #0ff, transparent);
            animation: bar-slide 2.5s ease-in-out infinite;
            z-index: 3;
        }
        @keyframes bar-slide {
            0%   { transform: translateX(-100%); opacity: 0; }
            30%  { opacity: 1; }
            70%  { opacity: 1; }
            100% { transform: translateX(100%); opacity: 0; }
        }

        /* Main content wrapper */
        .loading-inner {
            position: relative;
            z-index: 5;
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* ── Header ── */
        .header-group {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.45rem;
            color: #00ffb4;
            text-transform: uppercase;
            margin-bottom: 6px;
            opacity: 0.8;
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 0.3rem;
            background: linear-gradient(135deg, #fff 30%, #00ffb4 70%, #0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stream-label {
            font-size: 0.7rem;
            letter-spacing: 0.25rem;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* ── Thumbnail preview ── */
        .thumb-wrapper {
            position: relative;
            width: 320px;
            height: 180px;
            margin-bottom: 24px;
            border: 1px solid rgba(0,255,180,0.25);
            border-radius: 6px;
            overflow: hidden;
            background: #0a0f1a;
            box-shadow: 0 0 40px rgba(0,255,180,0.1), 0 0 80px rgba(0,100,255,0.08);
        }

        .thumb-wrapper img {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.6;
            filter: saturate(0.7) brightness(0.7);
            transition: opacity 0.5s ease;
        }

        /* Glitch overlay on thumbnail */
        .thumb-glitch {
            position: absolute;
            inset: 0;
            animation: glitch-flicker 3s infinite;
            pointer-events: none;
        }
        .thumb-glitch::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 3px, rgba(0,255,180,0.04) 3px, rgba(0,255,180,0.04) 4px
            );
        }

        @keyframes glitch-flicker {
            0%,89%,100% { opacity: 1; transform: translateX(0); }
            90% { opacity: 0.7; transform: translateX(-2px); clip-path: inset(20% 0 60% 0); }
            92% { opacity: 1; transform: translateX(2px); clip-path: inset(50% 0 20% 0); }
            94% { opacity: 0.8; transform: translateX(0); clip-path: none; }
        }

        /* Live badge */
        .live-badge {
            position: absolute;
            top: 8px; left: 8px;
            background: #ff0040;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 0.12rem;
            padding: 3px 8px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: live-pulse 1.4s ease-in-out infinite;
        }
        .live-dot {
            width: 5px; height: 5px;
            background: #fff;
            border-radius: 50%;
            animation: dot-blink 1.4s ease-in-out infinite;
        }
        @keyframes live-pulse { 0%,100%{opacity:1;} 50%{opacity:0.7;} }
        @keyframes dot-blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

        /* Stream ID overlay on thumb */
        .thumb-id {
            position: absolute;
            bottom: 6px; right: 8px;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.05rem;
        }

        /* Buffering progress bar on thumb */
        .thumb-buffer {
            position: absolute;
            bottom: 0; left: 0;
            height: 2px;
            background: linear-gradient(90deg, #00ffb4, #0ff);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 6px #00ffb4;
        }

        /* ── Main progress ring ── */
        .ring-group {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 20px;
        }

        .ring-svg {
            transform: rotate(-90deg);
            filter: drop-shadow(0 0 8px #00ffb4);
        }
        .ring-track {
            fill: none;
            stroke: rgba(0,255,180,0.12);
            stroke-width: 3;
        }
        .ring-fill {
            fill: none;
            stroke: url(#ringGrad);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 226;
            stroke-dashoffset: 226;
            transition: stroke-dashoffset 0.4s ease;
        }
        .ring-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: rotate(0); /* counter-rotate */
        }
        .ring-wrapper { position: relative; width: 80px; height: 80px; }

        .ring-pct {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 900;
            color: #00ffb4;
        }
        .ring-unit { font-size: 0.5rem; color: rgba(255,255,255,0.4); letter-spacing: 0.1rem; }

        /* Side stats */
        .stat-col { display: flex; flex-direction: column; gap: 10px; }
        .stat-item { display: flex; flex-direction: column; gap: 2px; }
        .stat-label {
            font-size: 0.52rem;
            letter-spacing: 0.18rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
        }
        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            color: #0ff;
            animation: val-flicker 3s infinite;
        }
        @keyframes val-flicker { 0%,95%,100%{opacity:1;} 97%{opacity:0.5;} }

        /* ── Phase indicator ── */
        .phase-row {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 18px;
        }
        .phase-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            transition: background 0.3s, box-shadow 0.3s;
        }
        .phase-dot.active {
            background: #00ffb4;
            box-shadow: 0 0 8px #00ffb4;
        }
        .phase-dot.done {
            background: rgba(0,255,180,0.4);
        }
        .phase-label {
            font-size: 0.62rem;
            letter-spacing: 0.2rem;
            color: #00ffb4;
            text-transform: uppercase;
            margin-left: 8px;
            animation: phase-blink 1.2s ease-in-out infinite;
        }
        @keyframes phase-blink { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

        /* ── Log console ── */
        .log-console {
            width: 100%;
            max-width: 820px;
            height: 200px;
            background: rgba(0,5,15,0.85);
            border: 1px solid rgba(0,255,180,0.15);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(12px);
        }

        .log-topbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 12px;
            background: rgba(0,255,180,0.05);
            border-bottom: 1px solid rgba(0,255,180,0.1);
        }
        .log-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
        }
        .log-dot.red    { background: #ff3b30; }
        .log-dot.yellow { background: #ffcc00; }
        .log-dot.green  { background: #34c759; }
        .log-title {
            font-size: 0.6rem;
            letter-spacing: 0.2rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            margin-left: auto;
        }

        .log-body {
            height: calc(100% - 30px);
            overflow-y: auto;
            padding: 10px 14px;
            scroll-behavior: smooth;
        }
        .log-body::-webkit-scrollbar { width: 3px; }
        .log-body::-webkit-scrollbar-track { background: transparent; }
        .log-body::-webkit-scrollbar-thumb { background: rgba(0,255,180,0.3); border-radius: 3px; }

        .log-line {
            display: flex;
            gap: 10px;
            font-size: 0.62rem;
            line-height: 1.6;
            opacity: 0;
            animation: log-appear 0.15s ease forwards;
            white-space: nowrap;
        }
        @keyframes log-appear { to { opacity: 1; } }

        .log-ts   { color: rgba(255,255,255,0.25); min-width: 72px; flex-shrink: 0; }
        .log-lvl  { min-width: 42px; flex-shrink: 0; font-weight: 700; }
        .log-src  { color: #0ff; min-width: 90px; flex-shrink: 0; opacity: 0.7; }
        .log-msg  { color: rgba(255,255,255,0.75); overflow: hidden; text-overflow: ellipsis; }

        .log-lvl.INFO  { color: #00ffb4; }
        .log-lvl.INIT  { color: #0ff; }
        .log-lvl.WARN  { color: #ffcc00; }
        .log-lvl.DEBUG { color: rgba(255,255,255,0.4); }
        .log-lvl.OK    { color: #34c759; }
        .log-lvl.DATA  { color: #a78bfa; }
        .log-lvl.NET   { color: #60a5fa; }
        .log-lvl.CACHE { color: #fb923c; }

        /* Scroll gradient mask */
        .log-console::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 40px;
            background: linear-gradient(transparent, rgba(0,5,15,0.9));
            pointer-events: none;
        }

        /* ── Bottom network meters ── */
        .meters-row {
            display: flex;
            gap: 24px;
            margin-top: 16px;
            align-items: flex-end;
        }
        .meter-item { display: flex; flex-direction: column; gap: 5px; align-items: flex-start; }
        .meter-label { font-size: 0.52rem; letter-spacing: 0.18rem; color: rgba(255,255,255,0.3); text-transform: uppercase; }
        .meter-bar-wrap {
            width: 140px; height: 4px;
            background: rgba(255,255,255,0.07);
            border-radius: 2px;
            overflow: hidden;
        }
        .meter-bar {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, #00ffb4, #0ff);
            width: 0%;
            transition: width 0.8s ease;
            box-shadow: 0 0 6px #00ffb4;
        }
        .meter-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            color: rgba(255,255,255,0.6);
        }

        /* ── Waveform visualizer ── */
        .wave-canvas {
            display: block;
            width: 140px; height: 28px;
            opacity: 0.8;
        }

        /* ══════════════════════════════════════════
           ERROR UI
        ══════════════════════════════════════════ */
        .error-container {
            display: none;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #03050a;
            position: relative;
            z-index: 20;
        }
        .error-content {
            text-align: center;
            padding: 3rem;
            background: rgba(255,40,40,0.04);
            border: 1px solid rgba(255,60,60,0.35);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            max-width: 520px;
        }
        .error-content h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: #ff4040;
            margin-bottom: 1rem;
            letter-spacing: 0.2rem;
        }
        .error-detail {
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
            line-height: 1.8;
            margin-bottom: 1rem;
        }
        .error-code {
            margin-top: 1.2rem;
            background: rgba(0,0,0,0.4);
            padding: 1rem;
            border-radius: 6px;
            font-size: 0.7rem;
            color: #ff6b6b;
            text-align: left;
            border-left: 3px solid #ff4040;
        }
        .error-code .err-label { color: rgba(255,255,255,0.3); font-size: 0.58rem; letter-spacing: 0.15rem; margin-bottom: 6px; }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <!-- ══ STREAM LOADING SCREEN ══ -->
    <div id="loading-container" class="stream-loading">
        <div class="status-bar"></div>
        <div class="corner corner--tl"></div>
        <div class="corner corner--tr"></div>
        <div class="corner corner--bl"></div>
        <div class="corner corner--br"></div>

        <div class="loading-inner">
            <!-- Header -->
            <div class="header-group">
                <div class="brand-tag">Node Access Layer v4.2.1</div>
                <div class="brand-name">ELIXIR Network</div>
                <div class="stream-label">Loading stream...</div>
            </div>

            <!-- Thumbnail preview -->
            <div class="thumb-wrapper" id="thumbWrapper" style="display:none;">
                <img id="streamThumb" src="" alt="stream thumbnail">
                <div class="thumb-glitch"></div>
                <div class="live-badge"><div class="live-dot"></div> LIVE</div>
                <div class="thumb-id" id="thumbId"></div>
                <div class="thumb-buffer" id="thumbBuffer"></div>
            </div>

            <!-- Ring + stats -->
            <div class="ring-group">
                <div class="ring-wrapper">
                    <svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">
                        <defs>
                            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#00ffb4"/>
                                <stop offset="100%" stop-color="#00cfff"/>
                            </linearGradient>
                        </defs>
                        <circle class="ring-track" cx="40" cy="40" r="36"/>
                        <circle class="ring-fill" id="ringFill" cx="40" cy="40" r="36"/>
                    </svg>
                    <div class="ring-center">
                        <div class="ring-pct" id="ringPct">0%</div>
                        <div class="ring-unit">BUFFER</div>
                    </div>
                </div>

                <div class="stat-col">
                    <div class="stat-item">
                        <div class="stat-label">Throughput</div>
                        <div class="stat-value" id="statThroughput">0.00 MB/s</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Latency</div>
                        <div class="stat-value" id="statLatency">--- ms</div>
                    </div>
                </div>
                <div class="stat-col">
                    <div class="stat-item">
                        <div class="stat-label">Protocol</div>
                        <div class="stat-value" id="statProto">WISP/2</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Segments</div>
                        <div class="stat-value" id="statSegs">0/0</div>
                    </div>
                </div>
            </div>

            <!-- Phase dots -->
            <div class="phase-row">
                <div class="phase-dot" id="pd0"></div>
                <div class="phase-dot" id="pd1"></div>
                <div class="phase-dot" id="pd2"></div>
                <div class="phase-dot" id="pd3"></div>
                <div class="phase-dot" id="pd4"></div>
                <div class="phase-label" id="phaseLabel">Initializing</div>
            </div>

            <!-- Log console -->
            <div class="log-console">
                <div class="log-topbar">
                    <div class="log-dot red"></div>
                    <div class="log-dot yellow"></div>
                    <div class="log-dot green"></div>
                    <div class="log-title">SYSTEM LOG — ELIXIR PROXY ENGINE</div>
                </div>
                <div class="log-body" id="logBody"></div>
            </div>

            <!-- Network meters + waveform -->
            <div class="meters-row">
                <div class="meter-item">
                    <div class="meter-label">CDN Bandwidth</div>
                    <div class="meter-bar-wrap"><div class="meter-bar" id="meterCDN"></div></div>
                    <div class="meter-val" id="meterCDNVal">0%</div>
                </div>
                <div class="meter-item">
                    <div class="meter-label">Node Load</div>
                    <div class="meter-bar-wrap"><div class="meter-bar" id="meterNode"></div></div>
                    <div class="meter-val" id="meterNodeVal">0%</div>
                </div>
                <div class="meter-item">
                    <div class="meter-label">Stream Buffer</div>
                    <div class="meter-bar-wrap"><div class="meter-bar" id="meterBuf"></div></div>
                    <div class="meter-val" id="meterBufVal">0%</div>
                </div>
                <div class="meter-item">
                    <div class="meter-label">Audio Waveform</div>
                    <canvas class="wave-canvas" id="waveCanvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- ══ ERROR SCREEN ══ -->
    <div id="error-container" class="error-container">
        <div class="error-content">
            <h1>STREAM FAILED</h1>
            <div class="error-detail" id="errorDetail">Connection error.</div>
            <div class="error-code">
                <div class="err-label">ERROR DETAILS</div>
                <div id="errorCode">—</div>
            </div>
        </div>
    </div>

    <!-- Embed iframe -->
    <iframe id="embed-frame"></iframe>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script type="module">
        import { registerSW } from "/prxy/register-sw.mjs";
        import * as BareMux from "/prxy/baremux/index.mjs";

        /* ══════════════════════════════════
           PARTICLES
        ══════════════════════════════════ */
        particlesJS('particles-js', {
            particles: {
                number: { value: 55, density: { enable: true, value_area: 900 } },
                color: { value: ['#00ffb4', '#0ff', '#6366f1'] },
                shape: { type: 'circle' },
                opacity: { value: 0.25, random: true },
                size: { value: 1.5, random: true },
                line_linked: { enable: true, distance: 130, color: '#00ffb4', opacity: 0.12, width: 1 },
                move: { enable: true, speed: 1.2 }
            },
            interactivity: { events: { onhover: { enable: true, mode: 'grab' } } },
            retina_detect: true
        });

        /* ══════════════════════════════════
           WISP / PROXY SETUP
        ══════════════════════════════════ */
        const connection = new BareMux.BareMuxConnection("/prxy/baremux/worker.js");
        const wispServers = [
            "wss://wisp.rhw.one/",
            "wss://anura.pro/",
            "wss://wisp.mercurywork.shop/"
        ];
        let activeWispUrl = null;

        async function checkWispServer(url) {
            return new Promise((resolve) => {
                let done = false;
                try {
                    const ws = new WebSocket(url);
                    const t = setTimeout(() => { if (!done) { done=true; ws.close(); resolve(false); } }, 3500);
                    ws.onopen  = () => { if (!done) { done=true; clearTimeout(t); ws.close(); resolve(true);  } };
                    ws.onerror = () => { if (!done) { done=true; clearTimeout(t); ws.close(); resolve(false); } };
                } catch { if (!done) { done=true; resolve(false); } }
            });
        }

        async function getAvailableWisp() {
            if (activeWispUrl) return activeWispUrl;
            for (const url of wispServers) {
                addLog('NET', 'wisp.probe', `Testing relay node: ${new URL(url).hostname}`);
                const ok = await checkWispServer(url);
                if (ok) {
                    addLog('OK', 'wisp.probe', `Relay node accepted: ${new URL(url).hostname} [RTT OK]`);
                    activeWispUrl = url;
                    return url;
                }
                addLog('WARN', 'wisp.probe', `Node unreachable: ${new URL(url).hostname} — trying next`);
            }
            throw new Error("All relay nodes exhausted. No WISP endpoint responded within timeout.");
        }

        function search(input, tpl = "https://html.duckduckgo.com/html?t=h_&q=%s") {
            try { return new URL(input).toString(); } catch {}
            try { const u = new URL(`http://${input}`); if (u.hostname.includes('.')) return u.toString(); } catch {}
            return tpl.replace('%s', encodeURIComponent(input));
        }

        async function getUV(input) {
            await registerSW();
            const url = search(input);
            const wispUrl = await getAvailableWisp();
            if ((await connection.getTransport()) !== '/prxy/epoxy/index.mjs') {
                await connection.setTransport('/prxy/epoxy/index.mjs', [{ wisp: wispUrl }]);
            }
            return __uv$config.prefix + __uv$config.encodeUrl(url);
        }

        /* ══════════════════════════════════
           URL PARSING
        ══════════════════════════════════ */
        function getUrlFromFragment() {
            const f = window.location.hash.substring(1);
            if (!f) return null;
            try { return decodeURIComponent(f); } catch { return f; }
        }

        function extractVideoId(url) {
            const m = url.match(/\/embed\/([A-Za-z0-9_\-]{6,20})/);
            return m ? m[1] : null;
        }

        function isYouTubeNocookieEmbed(url) {
            return /youtube-nocookie\.com\/embed\//i.test(url);
        }

        /* ══════════════════════════════════
           LOGGING ENGINE
        ══════════════════════════════════ */
        const logBody = document.getElementById('logBody');

        function ts() {
            const now = new Date();
            return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}.${String(now.getMilliseconds()).padStart(3,'0')}`;
        }

        function addLog(level, src, msg) {
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `<span class="log-ts">${ts()}</span><span class="log-lvl ${level}">${level}</span><span class="log-src">[${src}]</span><span class="log-msg">${msg}</span>`;
            logBody.appendChild(line);
            logBody.scrollTop = logBody.scrollHeight;
        }

        /* ══════════════════════════════════
           PROGRESS / ANIMATION ENGINE
        ══════════════════════════════════ */
        const ringFill  = document.getElementById('ringFill');
        const ringPct   = document.getElementById('ringPct');
        const thumbBuf  = document.getElementById('thumbBuffer');
        const meterCDN  = document.getElementById('meterCDN');
        const meterNode = document.getElementById('meterNode');
        const meterBuf  = document.getElementById('meterBuf');
        const mCDNVal   = document.getElementById('meterCDNVal');
        const mNodeVal  = document.getElementById('meterNodeVal');
        const mBufVal   = document.getElementById('meterBufVal');
        const statThr   = document.getElementById('statThroughput');
        const statLat   = document.getElementById('statLatency');
        const statProto = document.getElementById('statProto');
        const statSegs  = document.getElementById('statSegs');

        const CIRCUMFERENCE = 226;
        let currentPct = 0;

        function setProgress(pct) {
            currentPct = pct;
            const offset = CIRCUMFERENCE - (CIRCUMFERENCE * pct / 100);
            ringFill.style.strokeDashoffset = offset;
            ringPct.textContent = Math.round(pct) + '%';
            if (thumbBuf) thumbBuf.style.width = pct + '%';
        }

        function setMeter(el, valEl, pct) {
            el.style.width = pct + '%';
            valEl.textContent = Math.round(pct) + '%';
        }

        function randBetween(a, b) { return a + Math.random() * (b - a); }

        // Phase definitions
        const phases = [
            'Initializing',
            'Node Handshake',
            'Stream Routing',
            'Buffer Fill',
            'Ready'
        ];
        let currentPhase = 0;

        function setPhase(idx) {
            currentPhase = idx;
            for (let i = 0; i < 5; i++) {
                const d = document.getElementById(`pd${i}`);
                if (i < idx)  { d.className = 'phase-dot done'; }
                else if (i === idx) { d.className = 'phase-dot active'; }
                else { d.className = 'phase-dot'; }
            }
            document.getElementById('phaseLabel').textContent = phases[idx];
        }

        /* Waveform canvas */
        const waveCanvas = document.getElementById('waveCanvas');
        const wCtx = waveCanvas.getContext('2d');
        waveCanvas.width  = 140;
        waveCanvas.height = 28;
        let waveData = new Array(40).fill(0);
        let waveActive = false;

        function drawWave() {
            wCtx.clearRect(0, 0, 140, 28);
            waveData.shift();
            waveData.push(waveActive ? randBetween(2, 13) : randBetween(0, 2));

            wCtx.beginPath();
            wCtx.strokeStyle = '#00ffb4';
            wCtx.lineWidth = 1.5;
            wCtx.shadowColor = '#00ffb4';
            wCtx.shadowBlur = 4;

            waveData.forEach((v, i) => {
                const x = (i / (waveData.length - 1)) * 140;
                const y = 14 - v;
                i === 0 ? wCtx.moveTo(x, y) : wCtx.lineTo(x, y);
            });
            wCtx.stroke();

            wCtx.beginPath();
            waveData.forEach((v, i) => {
                const x = (i / (waveData.length - 1)) * 140;
                const y = 14 + v;
                i === 0 ? wCtx.moveTo(x, y) : wCtx.lineTo(x, y);
            });
            wCtx.stroke();
            requestAnimationFrame(drawWave);
        }
        drawWave();

        /* ══════════════════════════════════
           DETAILED LOG SEQUENCES
        ══════════════════════════════════ */
        function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function runInitLogs() {
            addLog('INIT', 'core.boot', 'ELIXIR Proxy Engine v4.2.1 initializing...');
            await delay(80);
            addLog('INIT', 'core.boot', 'Loading UV service worker configuration...');
            await delay(60);
            addLog('DEBUG', 'sw.loader', 'Checking navigator.serviceWorker availability...');
            await delay(50);
            addLog('OK',   'sw.loader', 'ServiceWorker API found — scope: /prxy/');
            await delay(90);
            addLog('INFO', 'sw.register', 'Registering UV service worker at /prxy/uv.sw.js');
            await delay(70);
            addLog('OK',   'sw.register', 'ServiceWorker registered — state: activated');
            await delay(50);
            addLog('DEBUG', 'sw.register', 'SW cache version: uv-cache-v3 validated');
            await delay(80);
            addLog('INFO', 'baremux.init', 'Initializing BareMux connection layer...');
            await delay(60);
            addLog('DEBUG', 'baremux.init', 'Worker endpoint: /prxy/baremux/worker.js');
            await delay(40);
            addLog('OK',   'baremux.init', 'BareMux connection object created');
        }

        async function runWispLogs(hostname) {
            addLog('NET', 'wisp.conn', `Attempting WebSocket upgrade to ${hostname}`);
            await delay(100);
            addLog('NET', 'wisp.conn', `WS handshake initiated — protocol: WSS/TLS 1.3`);
            await delay(120);
            addLog('NET', 'wisp.conn', `TLS certificate chain verified (Let\'s Encrypt R3)`);
            await delay(80);
            addLog('OK',  'wisp.conn', `WebSocket connection OPEN — bufferedAmount: 0`);
            await delay(60);
            addLog('INFO','wisp.handshake', 'Sending WISP protocol negotiation frame...');
            await delay(90);
            addLog('DEBUG','wisp.handshake', 'WISP version: 2.0 | max_streams: 256');
            await delay(70);
            addLog('OK',  'wisp.handshake', `Relay accepted — session_id: ${Math.random().toString(36).slice(2,10).toUpperCase()}`);
            await delay(80);
            addLog('INFO','transport.set', 'Setting transport: /prxy/epoxy/index.mjs');
            await delay(100);
            addLog('DEBUG','transport.set', `Epoxy WASM module loading (${(1.2 + Math.random()*0.8).toFixed(1)} MB)...`);
            await delay(150);
            addLog('OK',  'transport.set', 'Epoxy transport established over WISP tunnel');
        }

        async function runStreamRoutingLogs(videoId) {
            addLog('INFO', 'stream.route', `Resolving stream manifest for ID: ${videoId}`);
            await delay(80);
            addLog('DEBUG','url.encoder', `Input URL encoded via UV encodeUrl()`);
            await delay(60);
            addLog('DEBUG','url.encoder', `Prefix applied: ${__uv$config?.prefix ?? '/prxy/service/'}`);
            await delay(70);
            addLog('INFO', 'proxy.req', 'Constructing proxied request headers...');
            await delay(60);
            addLog('DEBUG','proxy.req', 'X-Forwarded-For: [redacted] | Origin: [stripped]');
            await delay(50);
            addLog('DEBUG','proxy.req', 'Cookie isolation: ACTIVE | Referrer: none');
            await delay(80);
            addLog('NET',  'cdn.resolve', 'Resolving youtube-nocookie.com via DoH...');
            await delay(110);
            addLog('OK',   'cdn.resolve', `A record: 142.250.${Math.floor(Math.random()*200)+50}.${Math.floor(Math.random()*200)+10} (TTL 300s)`);
            await delay(70);
            addLog('INFO', 'embed.parse', `Parsing embed page: /embed/${videoId}`);
            await delay(90);
            addLog('DEBUG','embed.parse', 'ytInitialPlayerResponse parsing...');
            await delay(80);
            addLog('DATA', 'embed.parse', `videoDetails.title: [STREAM] | isLive: checking...`);
            await delay(100);
            addLog('DATA', 'embed.parse', `streamingData.adaptiveFormats: found`);
            await delay(70);
            addLog('DATA', 'embed.parse', 'mimeType: video/mp4; codecs="avc1.640028,mp4a.40.2"');
            await delay(60);
            addLog('INFO', 'hls.probe',  'Probing HLS manifest endpoint...');
            await delay(90);
            addLog('OK',   'hls.probe',  'M3U8 playlist reachable — segments estimated: 6');
        }

        async function runBufferLogs(videoId, onProgress) {
            const totalSegs = 6;
            for (let i = 1; i <= totalSegs; i++) {
                const segHash = Math.random().toString(36).slice(2, 10);
                const segSize = (randBetween(1.2, 4.8)).toFixed(2);
                const segMs   = Math.floor(randBetween(80, 220));
                addLog('DATA', 'hls.fetch', `Fetching segment ${i}/${totalSegs}: sq/${segHash}.ts`);
                await delay(segMs * 0.4);
                addLog('CACHE','proxy.cache', `Cache MISS — forwarding to upstream CDN`);
                await delay(segMs * 0.3);
                addLog('NET', 'http.fetch',  `GET /videoplayback?sq=${i}&...  200 OK  ${segSize}MB  ${segMs}ms`);
                await delay(segMs * 0.3);
                addLog('OK',  'hls.fetch',  `Segment ${i} buffered — duration: ${(randBetween(1.8,2.2)).toFixed(2)}s | keyframe OK`);

                statSegs.textContent = `${i}/${totalSegs}`;
                statThr.textContent  = (parseFloat(segSize) / (segMs / 1000)).toFixed(2) + ' MB/s';
                statLat.textContent  = segMs + ' ms';
                onProgress(Math.round((i / totalSegs) * 85));
                setMeter(meterBuf, mBufVal, Math.round((i / totalSegs) * 100));
            }
            await delay(100);
            addLog('INFO', 'decoder.init', 'Initializing media decoder pipeline...');
            await delay(80);
            addLog('DEBUG','decoder.init', 'VideoDecoder API: supported | baseline: H.264');
            await delay(60);
            addLog('OK',  'decoder.init', 'Decode context ready — GPU acceleration: enabled');
            await delay(70);
            addLog('INFO', 'audio.ctx', 'AudioContext created — sampleRate: 44100 Hz');
            await delay(60);
            addLog('OK',  'audio.ctx', 'Audio pipeline unlocked — latency: 20ms');
            onProgress(95);
        }

        async function runFinalLogs() {
            addLog('INFO', 'frame.inject', 'Injecting proxied URL into sandbox iframe...');
            await delay(80);
            addLog('DEBUG','frame.inject', 'sandbox flags: allow-scripts allow-same-origin allow-presentation');
            await delay(70);
            addLog('INFO', 'player.load', 'YouTube player bootstrap detected in frame...');
            await delay(100);
            addLog('OK',  'player.load', 'Player state: READY | Autoplay policy: bypassed');
            await delay(80);
            addLog('OK',  'stream.ready', '█ STREAM ACTIVE — all systems nominal █');
        }

        /* ══════════════════════════════════
           METER ANIMATION LOOP
        ══════════════════════════════════ */
        function animateMeters() {
            let cdnTarget = 0, nodeTarget = 0;
            setInterval(() => {
                cdnTarget  = Math.min(100, cdnTarget  + randBetween(3, 10));
                nodeTarget = Math.min(100, nodeTarget + randBetween(2, 8));
                setMeter(meterCDN,  mCDNVal,  cdnTarget);
                setMeter(meterNode, mNodeVal, nodeTarget);
            }, 400);
        }

        /* ══════════════════════════════════
           THUMBNAIL REVEAL
        ══════════════════════════════════ */
        function showThumbnail(videoId) {
            const wrap = document.getElementById('thumbWrapper');
            const img  = document.getElementById('streamThumb');
            const idEl = document.getElementById('thumbId');
            img.src = `https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`;
            idEl.textContent = `ID: ${videoId}`;
            wrap.style.display = 'block';
            waveActive = true;
            addLog('INFO', 'thumb.fetch', `Fetching thumbnail: i.ytimg.com/vi/${videoId}/mqdefault.jpg`);
            img.onload  = () => addLog('OK',   'thumb.fetch', 'Thumbnail loaded — 320×180 JPEG');
            img.onerror = () => addLog('WARN', 'thumb.fetch', 'Thumbnail unavailable — placeholder shown');
        }

        /* ══════════════════════════════════
           ERROR
        ══════════════════════════════════ */
        function showError(message, detail = '') {
            document.getElementById('loading-container').style.display = 'none';
            document.getElementById('errorDetail').textContent = message;
            document.getElementById('errorCode').textContent = detail || message;
            document.getElementById('error-container').style.display = 'flex';
        }

        /* ══════════════════════════════════
           MAIN FLOW
        ══════════════════════════════════ */
        async function embedUrl() {
            const url = getUrlFromFragment();
            if (!url) return showError('URL fragment missing.', 'Usage: /embed#https://www.youtube-nocookie.com/embed/VIDEO_ID');

            const videoId = extractVideoId(url);
            if (!isYouTubeNocookieEmbed(url) || !videoId) {
                return showError(`Invalid stream URL: ${url}`, 'Expected: /embed#https://www.youtube-nocookie.com/embed/VIDEO_ID');
            }

            try {
                // Phase 0 — Init
                setPhase(0);
                await runInitLogs();
                setProgress(8);
                await delay(200);

                // Phase 1 — Node handshake
                setPhase(1);
                showThumbnail(videoId);
                animateMeters();

                let wispUrl;
                try {
                    wispUrl = await getAvailableWisp();
                } catch (e) {
                    throw new Error(e.message);
                }
                await runWispLogs(new URL(wispUrl).hostname);
                setProgress(25);
                await delay(100);

                // Phase 2 — Stream routing
                setPhase(2);
                statProto.textContent = 'WISP/2+UV';
                await runStreamRoutingLogs(videoId);
                setProgress(45);
                await delay(100);

                // Phase 3 — Buffer fill
                setPhase(3);
                await runBufferLogs(videoId, setProgress);
                setProgress(98);
                await delay(150);

                // Phase 4 — Final
                setPhase(4);
                await runFinalLogs();
                setProgress(100);
                await delay(300);

                // Get proxied URL and inject
                const proxiedUrl = await getUV(url);
                const iframe = document.getElementById('embed-frame');

                iframe.onload = () => {
                    document.getElementById('loading-container').style.display = 'none';
                    iframe.style.display = 'block';
                    document.title = `ELIXIR Stream | ${videoId}`;
                };
                iframe.onerror = () => showError('Iframe load failed.', 'The stream frame could not be rendered.');
                iframe.src = proxiedUrl;

            } catch (err) {
                addLog('WARN', 'core.error', err.message || 'Unhandled exception in proxy pipeline');
                showError(
                    err.message || 'Stream proxy failed.',
                    `${err.name || 'Error'}: ${err.message}\nStack: ${(err.stack || '').slice(0, 200)}`
                );
            }
        }

        window.addEventListener('hashchange', () => {
            document.getElementById('loading-container').style.display = 'flex';
            document.getElementById('error-container').style.display = 'none';
            document.getElementById('embed-frame').style.display = 'none';
            document.getElementById('logBody').innerHTML = '';
            embedUrl();
        });

        const init = () => {
            if (typeof __uv$config !== 'undefined') {
                embedUrl();
            } else {
                const check = setInterval(() => {
                    if (typeof __uv$config !== 'undefined') { clearInterval(check); embedUrl(); }
                }, 10);
            }
        };

        if (document.readyState === 'complete') init();
        else window.addEventListener('load', init);
    </script>
</body>
