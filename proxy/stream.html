<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELIXIR | Stream ver2</title>
    <link rel="icon" type="image/x-icon" href="/favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400&family=Inter:wght@400;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
            background: #050507;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0.4;
        }
        
        #embed-frame {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
            position: relative;
            z-index: 2;
        }
        
        /* --- Loading Container --- */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, #0f172a 0%, #050507 100%);
            position: relative;
            z-index: 10;
            padding: 20px;
        }
        
        /* Thumbnail Preview */
        .preview-box {
            width: 320px;
            height: 180px;
            margin-bottom: 2rem;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(168, 85, 247, 0.2);
            position: relative;
            background: #000;
            display: none; /* 初期は非表示、ID取得後に表示 */
            animation: fadeIn 0.8s ease-out;
        }

        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        .preview-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(5,5,7,0.8) 0%, transparent 100%);
        }

        /* Elixir Orb Animation */
        .elixir-orb {
            width: 60px;
            height: 60px;
            margin-bottom: 1.5rem;
            position: relative;
            background: linear-gradient(45deg, #6366f1, #a855f7);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.4);
            animation: liquid-morph 3s ease-in-out infinite, orb-glow 2s ease-in-out infinite alternate;
        }

        @keyframes liquid-morph {
            0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            33% { border-radius: 70% 30% 50% 50% / 50% 50% 30% 70%; }
            66% { border-radius: 50% 50% 30% 70% / 70% 30% 50% 50%; }
        }

        @keyframes orb-glow {
            from { transform: scale(1); box-shadow: 0 0 30px rgba(99, 102, 241, 0.3); }
            to { transform: scale(1.1); box-shadow: 0 0 50px rgba(168, 85, 247, 0.5); }
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .status-text {
            color: #a855f7;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        /* Console Log Area */
        .console-container {
            width: 100%;
            max-width: 600px;
            height: 150px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            overflow-y: hidden;
            position: relative;
            backdrop-filter: blur(5px);
        }

        .console-log {
            color: #00ff9d;
            line-height: 1.4;
            display: flex;
            flex-direction: column-reverse; /* 新しいログを上に */
        }

        .log-line {
            margin-bottom: 2px;
            opacity: 0.9;
        }

        .log-line span.timestamp { color: #555; margin-right: 8px; }
        .log-line span.info { color: #6366f1; }
        .log-line span.success { color: #00ff9d; }

        /* Error UI */
        .error-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #050507;
            position: relative;
            z-index: 20;
        }
        
        .error-content {
            text-align: center;
            padding: 2.5rem;
            background: rgba(20, 20, 25, 0.8);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            max-width: 500px;
        }
        
        .error-content h1 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: #ff6b6b;
            text-transform: uppercase;
        }
        
        #error-details {
            background: rgba(0, 0, 0, 0.4);
            padding: 1rem;
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #ccc;
            text-align: left;
            margin-top: 1rem;
            border-left: 3px solid #ff6b6b;
            white-space: pre-wrap;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>
    <div id="particles-js"></div>
    
    <div id="loading-container" class="loading-container">
        <div id="preview-box" class="preview-box">
            <img id="yt-thumb" src="" alt="Thumbnail">
            <div class="preview-overlay"></div>
        </div>

        <div class="elixir-orb"></div>
        <h1 class="brand-name">ELIXIR Network</h1>
        <p id="loading-status" class="status-text">Loading streams...</p>

        <div class="console-container">
            <div id="console-log" class="console-log">
                </div>
        </div>
    </div>
    
    <div id="error-container" class="error-container" style="display: none;">
        <div class="error-content">
            <h1>Sanctuary Offline</h1>
            <p style="color: rgba(255,255,255,0.6); font-size: 0.9rem;">ストリーム接続の確立中に致命的なエラーが発生しました。</p>
            <div id="error-details"></div>
            <button onclick="location.reload()" style="margin-top: 1.5rem; background: transparent; border: 1px solid #a855f7; color: #fff; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-family: inherit;">再試行</button>
        </div>
    </div>
    
    <iframe id="embed-frame" style="display: none;"></iframe>
    
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    
    <script type="module">
        import { registerSW } from "/prxy/register-sw.mjs";
        import * as BareMux from "/prxy/baremux/index.mjs";

        // --- Configuration ---
        const wispServers = [
            "wss://wisp.rhw.one/",     
            "wss://anura.pro/",
            "wss://wisp.mercurywork.shop/"
        ];

        const logElement = document.getElementById('console-log');
        const statusElement = document.getElementById('loading-status');

        // --- Utilities ---
        function addLog(message, type = 'info') {
            const line = document.createElement('div');
            line.className = 'log-line';
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 3 });
            
            let typeClass = 'info';
            if (message.includes('SUCCESS') || message.includes('CONNECTED')) typeClass = 'success';
            if (message.includes('ERR') || message.includes('FAILED')) typeClass = 'error';

            line.innerHTML = `<span class="timestamp">[${time}]</span> <span class="${typeClass}">${message}</span>`;
            logElement.prepend(line);
        }

        function extractVideoId(url) {
            const regex = /(?:embed\/|v=)([^#\/\?&]+)/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        // --- Particle Background ---
        particlesJS('particles-js', {
            particles: {
                number: { value: 50, density: { enable: true, value_area: 800 } },
                color: { value: '#a855f7' },
                shape: { type: 'circle' },
                opacity: { value: 0.4 },
                size: { value: 2 },
                line_linked: { enable: true, distance: 150, color: '#6366f1', opacity: 0.2, width: 1 },
                move: { enable: true, speed: 1 }
            },
            interactivity: { events: { onhover: { enable: true, mode: 'grab' } } },
            retina_detect: true
        });

        // --- Core Logic ---
        const connection = new BareMux.BareMuxConnection("/prxy/baremux/worker.js");

        async function checkWispServer(url) {
            addLog(`PINGING NODE: ${new URL(url).hostname}...`);
            return new Promise((resolve) => {
                const ws = new WebSocket(url);
                const timeout = setTimeout(() => {
                    ws.close();
                    resolve(false);
                }, 3500);
                ws.onopen = () => {
                    clearTimeout(timeout);
                    ws.close();
                    resolve(true);
                };
                ws.onerror = () => {
                    clearTimeout(timeout);
                    resolve(false);
                };
            });
        }

        async function initializeProxy(destinationUrl) {
            try {
                addLog("INITIALIZING STREAM PROXY PROTOCOL...");
                const videoId = extractVideoId(destinationUrl);
                if (videoId) {
                    addLog(`TARGET YOUTUBE_ID DETECTED: ${videoId}`);
                    const thumb = document.getElementById('yt-thumb');
                    const previewBox = document.getElementById('preview-box');
                    thumb.src = `https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`;
                    previewBox.style.display = 'block';
                    addLog("THUMBNAIL RESOURCE FETCHED.");
                }

                let activeWisp = null;
                for (const node of wispServers) {
                    if (await checkWispServer(node)) {
                        activeWisp = node;
                        addLog(`NODE HANDSHAKE SUCCESS: ${new URL(node).hostname}`, 'success');
                        break;
                    } else {
                        addLog(`NODE TIMEOUT: ${new URL(node).hostname}`, 'error');
                    }
                }

                if (!activeWisp) throw new Error("ALL ELIXIR NODES ARE CURRENTLY OFFLINE.");

                statusElement.textContent = "Infusing Elixir...";
                addLog("SETTING UP EPOXY-WISP TRANSPORT...");
                await connection.setTransport("/prxy/epoxy/index.mjs", [{ wisp: activeWisp }]);
                addLog("TRANSPORT LAYER ESTABLISHED.");

                addLog("REGISTERING SERVICE WORKER...");
                await registerSW();
                addLog("SW PROTOCOL ACTIVE.");

                addLog("ENCODING DESTINATION REQUEST...");
                const proxiedUrl = __uv$config.prefix + __uv$config.encodeUrl(destinationUrl);
                
                addLog("FINALIZING HANDSHAKE...");
                setTimeout(() => {
                    addLog("STREAM FLOWING. REDIRECTING...", 'success');
                    const iframe = document.getElementById('embed-frame');
                    iframe.onload = () => {
                        document.getElementById('loading-container').style.display = 'none';
                        iframe.style.display = 'block';
                    };
                    iframe.src = proxiedUrl;
                }, 800);

            } catch (err) {
                showError(err.message);
            }
        }

        function showError(msg) {
            document.getElementById('loading-container').style.display = 'none';
            const errBox = document.getElementById('error-container');
            const errDetails = document.getElementById('error-details');
            errBox.style.display = 'flex';
            errDetails.textContent = `TRACE_ID: ${Math.random().toString(36).substring(7).toUpperCase()}\nERROR: ${msg}\nTIMESTAMP: ${new Date().toISOString()}`;
        }

        function getUrlFromFragment() {
            const hash = window.location.hash.substring(1);
            return hash ? decodeURIComponent(hash) : null;
        }

        const init = () => {
            const url = getUrlFromFragment();
            if (!url) {
                showError("URL Fragment is missing. Please provide a destination.");
                return;
            }

            if (typeof __uv$config !== 'undefined') {
                initializeProxy(url);
            } else {
                const check = setInterval(() => {
                    if (typeof __uv$config !== 'undefined') {
                        clearInterval(check);
                        initializeProxy(url);
                    }
                }, 50);
            }
        };

        window.addEventListener('load', init);
        window.addEventListener('hashchange', () => location.reload());
    </script>
</body>
</html>
