<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設定 - YouTube Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f0f0f; --text: #f1f1f1; --card: #1f1f1f; --accent: #ff0000; --blue: #3ea6ff; }
        body { background: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        .header { padding: 15px 20px; display: flex; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .back-btn { color: white; text-decoration: none; margin-right: 20px; font-size: 20px; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .section { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--blue); }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #333; }
        .setting-item:last-child { border-bottom: none; }
        .info { flex: 1; margin-right: 20px; }
        .label { font-size: 16px; font-weight: 500; display: block; margin-bottom: 4px; }
        .desc { font-size: 13px; color: #aaa; }
        select, input[type="checkbox"] { padding: 10px; border-radius: 8px; background: #000; color: white; border: 1px solid #444; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 15px; margin-top: 10px; }
        .btn-ab { background: #333; color: white; }
        .btn-ab:hover { background: #444; }
        /* トースト通知 */
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #3ea6ff; color: #000; padding: 12px 24px; border-radius: 50px; font-weight: bold; opacity: 0; transition: 0.3s; pointer-events: none; }
        #toast.show { opacity: 1; bottom: 50px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1 style="font-size: 20px; margin: 0;">設定</h1>
    </div>

    <div class="container">
        <div class="section">
            <div class="section-title"><i class="fas fa-play-circle"></i> 再生設定</div>
            <div class="setting-item">
                <div class="info">
                    <span class="label">デフォルト動画サーバー</span>
                    <span class="desc">動画を開いた際に優先的に使用される接続方式です。</span>
                </div>
                <select id="playbackMode" onchange="notifySave('playbackMode', this.value)">
                    <option value="googlevideo">Googlevideo</option>
                    <option value="youtube-nocookie">Youtube-nocookie</option>
                    <option value="DL-Pro">DL-Pro</option>
                    <option value="YoutubeEdu-Kahoot">YoutubeEdu-Kahoot</option>
                    <option value="YoutubeEdu-Scratch">YoutubeEdu-Scratch</option>
                    <option value="Youtube-Pro">Youtube-Pro</option>
                </select>
            </div>
            <div class="setting-item">
                <div class="info">
                    <span class="label">自動ループ再生</span>
                    <span class="desc">動画が終了した際に自動的に最初から再生します。</span>
                </div>
                <input type="checkbox" id="videoLoop" onchange="notifySave('videoLoop', this.checked)">
            </div>
        </div>

        <div class="section">
            <div class="section-title"><i class="fas fa-user-secret"></i> プライバシー設定</div>
            <div class="setting-item">
                <div class="info">
                    <span class="label">偽装モード (Google)</span>
                    <span class="desc">タブのタイトルとアイコンをGoogleに変更し、カモフラージュします。</span>
                </div>
                <input type="checkbox" id="forgeryMode" onchange="notifySave('forgeryMode', this.checked); location.reload();">
            </div>
            <button class="btn btn-ab" onclick="openAB()"><i class="fas fa-external-link-alt"></i> about:blankでサイトを隠して開く</button>
        </div>
    </div>

    <div id="toast">設定を保存しました</div>

    <script>
        window.onload = () => {
            document.getElementById('playbackMode').value = localStorage.getItem('playbackMode') || 'googlevideo';
            document.getElementById('videoLoop').checked = localStorage.getItem('videoLoop') === 'true';
            document.getElementById('forgeryMode').checked = localStorage.getItem('forgeryMode') === 'true';
            if(localStorage.getItem('forgeryMode') === 'true') applyForgery();
        };

        function notifySave(key, val) {
            localStorage.setItem(key, val);
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function applyForgery() {
            document.title = "Google";
            let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.rel = 'shortcut icon'; link.href = 'https://www.google.com/favicon.ico';
            document.head.appendChild(link);
        }

        function openAB() {
            const win = window.open('about:blank', '_blank');
            const iframe = win.document.createElement('iframe');
            iframe.style = "position:fixed;top:0;left:0;width:100%;height:100%;border:none;";
            iframe.src = window.location.origin;
            win.document.body.style.margin = "0";
            win.document.body.appendChild(iframe);
        }
    </script>
</body>
</html>
