<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YouTube-Pro</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --text: #ffffff;
      --text-muted: #aaaaaa;
      --accent: #ff0000;
      --border: #303030;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Roboto", Arial, sans-serif;
    }

    /* Header */
    header {
      position: fixed; top: 0; width: 100%; height: 56px;
      background: var(--bg); display: flex; align-items: center;
      justify-content: space-between; padding: 0 16px; z-index: 1000;
    }
    .logo { font-size: 20px; font-weight: bold; text-decoration: none; color: white; }
    .logo span { color: var(--accent); }

    .search-area { flex: 0 1 720px; display: flex; position: relative; }
    .search-form { display: flex; width: 100%; background: #121212; border: 1px solid var(--border); border-radius: 40px; overflow: hidden; }
    .search-form input { flex: 1; background: transparent; border: none; color: white; height: 40px; padding: 0 16px; outline: none; }
    .search-form button { background: #222; border: none; border-left: 1px solid var(--border); color: white; padding: 0 20px; cursor: pointer; }

    /* Chips */
    .chips-bar {
      position: fixed; top: 56px; width: 100%; background: var(--bg);
      padding: 12px 16px; display: flex; gap: 12px; overflow-x: auto; z-index: 999;
      scrollbar-width: none;
    }
    .chip { background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 8px; font-size: 14px; white-space: nowrap; cursor: pointer; }
    .chip.active { background: white; color: black; }

    /* Grid */
    .container { margin-top: 120px; padding: 16px; }
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; row-gap: 32px; }

    .video-card { cursor: pointer; text-decoration: none; color: inherit; }
    .thumb { width: 100%; aspect-ratio: 16/9; background: #222; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
    .video-card:hover img { transform: scale(1.05); }

    .meta h3 { margin: 0; font-size: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .meta p { margin: 4px 0 0; font-size: 14px; color: var(--text-muted); }

    #loading { text-align: center; padding: 20px; color: var(--text-muted); }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo"><span>●</span>YouTube Pro</a>
    <div class="search-area">
      <form id="searchForm" class="search-form">
        <input id="searchInput" type="text" placeholder="検索">
        <button type="submit">🔍</button>
      </form>
    </div>
    <div style="width:40px;"></div>
  </header>

  <div class="chips-bar">
    <div class="chip active" data-q="trending">すべて</div>
    <div class="chip" data-q="音楽">音楽</div>
    <div class="chip" data-q="ゲーム">ゲーム</div>
    <div class="chip" data-q="ニュース">ニュース</div>
    <div class="chip" data-q="お笑い">お笑い</div>
  </div>

  <div class="container">
    <div id="videoGrid" class="video-grid"></div>
    <div id="loading" style="display:none;">読み込み中...</div>
  </div>

  <script>
    const videoGrid = document.getElementById('videoGrid');
    const searchForm = document.getElementById('searchForm');
    const searchInput = document.getElementById('searchInput');
    const loading = document.getElementById('loading');

    // ★ 重複排除のためのセット
    let displayedIds = new Set();
    let isFetching = false;
    let currentPage = 0;
    let currentQuery = '';

    async function loadContent(query = '', page = 0) {
      if (isFetching) return;
      isFetching = true;
      loading.style.display = 'block';

      // 最初から読み込む場合はIDリストをリセット
      if (page === 0) {
        displayedIds.clear();
        videoGrid.innerHTML = '';
      }

      const endpoint = (query && query !== 'trending')
        ? `/api/search?q=${encodeURIComponent(query)}&page=${page}`
        : `/api/trending?page=${page}`;

      try {
        const res = await fetch(endpoint);
        const data = await res.json();
        const items = data.items || [];

        items.forEach(item => {
          // ★ 既に表示されているIDなら無視して次の動画へ
          if (displayedIds.has(item.id)) return;
          
          displayedIds.add(item.id);

          const card = document.createElement('a');
          card.className = 'video-card';
          card.href = `/video/${item.id}`;
          card.innerHTML = `
            <div class="thumb"><img src="https://i3.ytimg.com/vi/${item.id}/mqdefault.jpg" loading="lazy"></div>
            <div class="meta">
              <h3>${item.title}</h3>
              <p>${item.channelTitle || 'YouTube Pro User'}</p>
            </div>
          `;
          videoGrid.appendChild(card);
        });

        // もし読み込んだ結果が少なすぎたら、自動的に次のページを試す（多様性確保）
        if (items.length < 5 && page < 5) {
          isFetching = false;
          loadContent(query, page + 1);
          return;
        }

      } catch (err) {
        console.error("Fetch Error:", err);
      } finally {
        isFetching = false;
        loading.style.display = 'none';
      }
    }

    // 初期化とイベント
    function init() {
      const params = new URLSearchParams(window.location.search);
      const q = params.get('q');
      if (q) {
        currentQuery = q;
        searchInput.value = q;
        loadContent(q, 0);
      } else {
        loadContent('trending', 0);
      }
    }

    searchForm.onsubmit = (e) => {
      e.preventDefault();
      const q = searchInput.value.trim();
      if (!q) return;
      currentQuery = q;
      history.pushState(null, '', `/search?q=${encodeURIComponent(q)}`);
      loadContent(q, 0);
    };

    // 無限スクロール
    window.onscroll = () => {
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
        if (!isFetching) {
          currentPage++;
          loadContent(currentQuery || 'trending', currentPage);
        }
      }
    };

    // チップス選択
    document.querySelector('.chips-bar').onclick = (e) => {
      if (e.target.classList.contains('chip')) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        currentPage = 0;
        currentQuery = e.target.dataset.q;
        loadContent(currentQuery, 0);
      }
    };

    window.onload = init;
  </script>
</body>
</html>
