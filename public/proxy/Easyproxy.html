<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易Webプロキシ</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #toolbar { background: #333; color: white; padding: 10px; display: flex; gap: 10px; }
        #url-input { flex-grow: 1; padding: 5px; border-radius: 4px; border: none; }
        button { padding: 5px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        #viewer-container { flex-grow: 1; border: none; width: 100%; overflow: auto; background: white; }
        #status { font-size: 12px; color: #ccc; margin-top: 5px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div id="toolbar">
    <input type="text" id="url-input" placeholder="https://example.com" value="https://example.com">
    <button onclick="loadPage()">閲覧する</button>
</div>
<div id="status">※CORS回避プロキシを使用して取得します。一部のサイトは表示できません。</div>

<div id="viewer-container">
    <iframe id="proxy-viewer"></iframe>
</div>

<script>
    async function loadPage() {
        const urlInput = document.getElementById('url-input').value;
        const viewer = document.getElementById('proxy-viewer');
        
        if (!urlInput.startsWith('http')) {
            alert('URLは http:// または https:// から入力してください。');
            return;
        }

        try {
            // CORSプロキシサービスを利用してHTMLを取得
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(urlInput)}`;
            
            document.getElementById('status').innerText = '読み込み中...';
            
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error('ネットワークエラー');
            
            const data = await response.json();
            
            // iframeの中に取得したHTMLを流し込む
            const doc = viewer.contentWindow.document;
            doc.open();
            
            // 相対パスを解決するための <base> タグを挿入
            const baseTag = `<base href="${urlInput}">`;
            const content = data.contents.replace('<head>', `<head>${baseTag}`);
            
            doc.write(content);
            doc.close();
            
            document.getElementById('status').innerText = `表示中: ${urlInput}`;
        } catch (error) {
            console.error(error);
            alert('読み込みに失敗しました。サイトがアクセスを拒否しているか、URLが正しくありません。');
            document.getElementById('status').innerText = 'エラーが発生しました。';
        }
    }

    // Enterキーで実行可能にする
    document.getElementById('url-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            loadPage();
        }
    });
</script>

</body>
</html>
